; FOV Slider F4SE - default settings
; Editable via the in-game F4SE Menu Framework menu (default toggle key: ])
;
; Bug-fix replacement for "Simple FOV Slider" (Papyrus / MCM) implemented as
; a native F4SE plugin. Settings here are read on game load and written when
; the user changes a slider in the F4SE Menu Framework.

[Display]
fFirstPersonFOV          = 80.0
fThirdPersonFOV          = 80.0
fViewmodelFOV            = 80.0
fPipBoyFOV               = 80.0
fTerminalFOV             = 80.0
fCameraDistance          = 15.0
bEnableFirstPersonAimFOV = false
fFirstPersonAimFOV       = 80.0
fThirdPersonAimFOV       = 50.0

[Interpolation]
; How many internal lerp steps used when blending between FOVs.
; Frames are 1 ms-spaced micro-sleeps issued from a worker thread, so this
; controls the *visual smoothness* of e.g. closing the Pip-Boy, not anything
; tied to game framerate.
iFrames     = 12
iFramesFast = 6

[GameLoad]
; -- Phase 1: frame-paced burst (the visible-pop fix) --
; After the game finishes loading a save, the engine re-initializes the camera
; FOV at some point during the first ~100-300 ms. To make that re-init
; imperceptible, we re-assert OUR camera FOV every iLoadBurstStepMs (default
; 8 ms = ~1 frame at 120 fps, 2 frames at 60 fps) for iLoadBurstDurationMs
; total milliseconds. Camera-FOV writes are essentially free so the only
; downside of a longer burst is one background thread running for that long.
;
; If you still see a visible pop on load, raise iLoadBurstDurationMs first
; (e.g. 800-1500). If you see your CPU pinning, raise iLoadBurstStepMs
; (e.g. 16 = 60-fps pace).
iLoadBurstDurationMs = 500
iLoadBurstStepMs     = 8

; -- Phase 2: safety-net retries --
; After the burst finishes, run N slower full re-applies spaced
; fRetryIntervalSec apart. Catches delayed engine re-init passes (cell
; load triggers, scripted intro sequences) that fire well after kPostLoadGame.
iRetryCount       = 6
fRetryIntervalSec = 0.5

[Diagnostics]
; bVerboseLogging - set spdlog level to "trace" instead of "info".
; Enables snapshot lines (full engine FOV dump) at every context transition
; and game-load milestone, plus traces every menu / animation event we
; observe. Cheap and the canonical way to root-cause an FOV regression.
bVerboseLogging = true

; bLogEveryEngineWrite - logs every SetEngineFloatSetting call with
; before/after values and the calling function tag, e.g.:
;   [FOVSlider] [ApplyFirstPersonFOV] WRITE fDefault1stPersonFOV:Display 90.00 -> 105.00 (Pref)
; Off by default because the load-burst alone issues ~250 writes per game
; load. Turn on when actively debugging "who wrote 90 to my FOV".
bLogEveryEngineWrite = false

; bLogEveryConsoleCommand - logs every `fov X Y` we issue. On by default;
; cheap (~1 line per slider tick / context transition).
bLogEveryConsoleCommand = true

; iDriftWatchIntervalMs - background polling interval (in ms) for the
; "drift watcher" that detects another agent (engine post-load FOV restore,
; another mod, scripted re-init) writing a wrong value to
; fDefault1stPersonFOV:Display. When the engine value differs from our
; saved value by >0.5 deg, a WARN line is logged with a full snapshot
; and (if bDriftAutoCorrect=true) a smooth lerp pulls the engine back.
; Set to 0 to disable. Default 50 (20 polls/sec) = ~3-4 frame detection
; at 60 fps. Each poll is one INI lookup + one float compare, well under
; 1 microsecond, so the CPU cost is negligible.
;
; Note: drift detection is paused while in Aiming context (camera FOV is
; intentionally different there). Pip-Boy / Terminal contexts are still
; checked because those only overlay the viewmodel FOV, not the camera.
iDriftWatchIntervalMs = 50

; iDriftWatchHotIntervalMs - tighter polling interval used right after
; specific menu-close events that are known to trigger engine FOV
; restores: LoadingMenu, FaderMenu, ExamineMenu (workbenches / crafting
; stations). 16 ms = 1 frame at 60 fps so any engine stray-write gets
; caught within a single frame. Outside the hot window the watcher
; reverts to iDriftWatchIntervalMs.
iDriftWatchHotIntervalMs = 16

; iDriftWatchHotDurationMs - how long the hot-poll mode stays engaged
; after each trigger event. The diagnostic log shows the engine can
; write default FOVs up to 1.7 seconds after ExamineMenu close
; (workbench teardown), so 3500 ms gives a safe upper bound for all
; observed cases. Each trigger event resets the hot deadline to
; "now + this duration", so back-to-back triggers (e.g. LoadingMenu
; -> FaderMenu) keep the hot window alive without shortening it.
iDriftWatchHotDurationMs = 3500

; bDriftAutoCorrect - when drift is detected, smoothly lerp the engine
; values back to our saved targets (same lerp shape as Pip-Boy / iron
; sights / game-load). This is the only line of defense against the
; engine's post-LoadingMenu/FaderMenu FOV restore (which fires 2-4
; seconds AFTER our scheduled retry window ends - proven via diagnostic
; logs from FOVSliderF4SE.log). Should always be on; only disable for
; bug reproduction or to study the raw drift behavior.
bDriftAutoCorrect = true

; iDriftCorrectDurationMs - how long the auto-correct lerp takes.
; Same lerp shape as the load burst, just on a shorter timeline since
; the player is in active gameplay. 250 ms feels invisible at 60 fps,
; fast enough that the user doesn't perceive an FOV shift.
iDriftCorrectDurationMs = 250
