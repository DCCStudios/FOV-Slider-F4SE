; FOV Slider F4SE - default settings
; Editable via the in-game F4SE Menu Framework menu (default toggle key: ])
;
; Bug-fix replacement for "Simple FOV Slider" (Papyrus / MCM) implemented as
; a native F4SE plugin. Settings here are read on game load and written when
; the user changes a slider in the F4SE Menu Framework.

[Display]
fFirstPersonFOV          = 80.0
fThirdPersonFOV          = 80.0
fViewmodelFOV            = 80.0
fPipBoyFOV               = 80.0
fTerminalFOV             = 80.0
fCameraDistance          = 15.0
bEnableFirstPersonAimFOV = false
fFirstPersonAimFOV       = 80.0
fThirdPersonAimFOV       = 50.0

[Interpolation]
; How many internal lerp steps used when blending between FOVs.
; Frames are 1 ms-spaced micro-sleeps issued from a worker thread, so this
; controls the *visual smoothness* of e.g. closing the Pip-Boy, not anything
; tied to game framerate.
iFrames     = 12
iFramesFast = 6

[GameLoad]
; -- Phase 1: frame-paced burst (the visible-pop fix) --
; After the game finishes loading a save, the engine re-initializes the camera
; FOV at some point during the first ~100-300 ms. To make that re-init
; imperceptible, we re-assert OUR camera FOV every iLoadBurstStepMs (default
; 8 ms = ~1 frame at 120 fps, 2 frames at 60 fps) for iLoadBurstDurationMs
; total milliseconds. Camera-FOV writes are essentially free so the only
; downside of a longer burst is one background thread running for that long.
;
; If you still see a visible pop on load, raise iLoadBurstDurationMs first
; (e.g. 800-1500). If you see your CPU pinning, raise iLoadBurstStepMs
; (e.g. 16 = 60-fps pace).
iLoadBurstDurationMs = 500
iLoadBurstStepMs     = 8

; -- Phase 2: safety-net retries --
; After the burst finishes, run N slower full re-applies spaced
; fRetryIntervalSec apart. Catches delayed engine re-init passes (cell
; load triggers, scripted intro sequences) that fire well after kPostLoadGame.
iRetryCount       = 6
fRetryIntervalSec = 0.5
